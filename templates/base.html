<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>{% block title %}원고지 — 써내려가는 이야기{% endblock %}</title>
<meta name="description" content="원고지, 한 칸 한 칸 채워가는 작은 블로그" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%224%22 fill=%22%23F7F3E8%22/><rect x=%222%22 y=%222%22 width=%2220%22 height=%2220%22 fill=%22none%22 stroke=%22%23B23A2E%22 stroke-width=%222%22/></svg>">
{% block head %}{% endblock %}
</head>
<body class="{% block bodyclass %}{% endblock %}">

<div class="grid-veil" aria-hidden="true"></div>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="brand" aria-label="원고지 홈으로">
      <svg class="brand-mark" viewBox="0 0 168 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="1" y="1" width="38" height="38"></rect>
          <rect x="43" y="1" width="38" height="38"></rect>
          <rect x="85" y="1" width="38" height="38"></rect>
          <rect x="127" y="1" width="38" height="38"></rect>
        </g>
        <g fill="currentColor" font-family="'Noto Serif KR', serif" font-weight="900" font-size="22" text-anchor="middle">
          <text x="20" y="28">원</text>
          <text x="62" y="28">고</text>
          <text x="104" y="28">지</text>
        </g>
        <g fill="var(--red)">
          <circle cx="146" cy="20" r="3"></circle>
        </g>
      </svg>
    </a>

    <nav class="main-nav" id="main-nav">
      <a href="/" class="nav-link">홈</a>
      <a href="/write" class="nav-link">글쓰기</a>
      <span class="auth-area">
        {% if current_user %}
          <span class="nav-user" title="{{ current_user.email }}">{{ current_user.nickname or current_user.email }}</span>
          <form method="POST" action="{{ url_for('logout') }}" class="logout-form">
            <button class="nav-link btn-ghost" type="submit">로그아웃</button>
          </form>
        {% else %}
          <a href="/login" class="nav-link">로그인</a>
          <a href="/signup" class="nav-link btn-ghost">회원가입</a>
        {% endif %}
      </span>
    </nav>

    <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기" aria-expanded="false">
      <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 2 L27 2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M1 10 L27 10" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M1 18 L27 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</header>

<main class="site-main">
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <p>200자 원고지 한 장처럼, 생각을 칸칸이 채워보세요.</p>
  <p class="footer-meta">원고지 · Firebase Admin SDK + Flask</p>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
