{% extends "base.html" %}
{% block title %}로그인 — 원고지{% endblock %}
{% block bodyclass %}page-auth{% endblock %}

{% block content %}
<section class="auth-section">
  <form class="auth-card" method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" novalidate>
    <div class="auth-card-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40"><rect x="1" y="1" width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.6"/><text x="20" y="27" text-anchor="middle" font-family="'Noto Serif KR',serif" font-weight="900" font-size="20" fill="currentColor">읽</text></svg>
    </div>
    <h1>로그인</h1>
    <p class="auth-sub">다시 만나서 반가워요. 이메일과 비밀번호를 입력해주세요.</p>

    <label class="field">
      <span>이메일</span>
      <input type="email" name="email" autocomplete="email" required value="{{ form.email or '' }}" placeholder="you@example.com" />
    </label>

    <label class="field">
      <span>비밀번호</span>
      <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
    </label>

    {% if error %}
    <p class="form-error" role="alert">{{ error }}</p>
    {% endif %}

    <button type="submit" class="btn btn-primary btn-block">로그인</button>

    <p class="auth-switch">계정이 없으신가요? <a href="/signup">회원가입</a></p>
  </form>
</section>
{% endblock %}
