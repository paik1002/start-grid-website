{% extends "base.html" %}
{% block title %}회원가입 — 원고지{% endblock %}
{% block bodyclass %}page-auth{% endblock %}

{% block content %}
<section class="auth-section">
  <form class="auth-card" method="POST" action="{{ url_for('signup') }}" novalidate>
    <div class="auth-card-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40"><rect x="1" y="1" width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.6"/><text x="20" y="27" text-anchor="middle" font-family="'Noto Serif KR',serif" font-weight="900" font-size="20" fill="currentColor">씀</text></svg>
    </div>
    <h1>회원가입</h1>
    <p class="auth-sub">원고지에 이름을 올리고 첫 칸을 채워보세요.</p>

    <label class="field">
      <span>닉네임</span>
      <input type="text" name="nickname" autocomplete="nickname" required value="{{ form.nickname or '' }}" placeholder="필명을 입력하세요" />
    </label>

    <label class="field">
      <span>이메일</span>
      <input type="email" name="email" autocomplete="email" required value="{{ form.email or '' }}" placeholder="you@example.com" />
    </label>

    <label class="field">
      <span>비밀번호</span>
      <input type="password" name="password" autocomplete="new-password" required minlength="6" placeholder="6자 이상" />
    </label>

    {% if error %}
    <p class="form-error" role="alert">{{ error }}</p>
    {% endif %}

    <button type="submit" class="btn btn-primary btn-block">회원가입</button>

    <p class="auth-switch">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
  </form>
</section>
{% endblock %}
